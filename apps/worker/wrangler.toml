name = "lownoise-news"
main = "src/index.ts"
compatibility_date = "2026-06-16"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[vars]
PUBLIC_API_BASE_URL = "https://distilled.news"
PUBLIC_WEB_BASE_URL = "https://distilled.news"
CLOUDFLARE_ACCOUNT_ID = "9cd5e9612de11953c367cbdec84ed662"
CLOUDFLARE_AI_GATEWAY_ID = "default"
OPENAI_MODEL = "gpt-4.1-mini"
EMAIL_FROM = "Distilled.news <noreply@distilled.news>"
APIFY_GOOGLE_NEWS_ACTOR_ID = "groupoject/google-news-scraper"
APIFY_X_ACTOR_ID = "kaitoeasyapi/twitter-x-data-tweet-scraper-pay-per-result-cheapest"
APIFY_LINKEDIN_COMPANY_ACTOR_ID = "harvestapi/linkedin-company-posts"
APIFY_LINKEDIN_PROFILE_ACTOR_ID = "harvestapi/linkedin-profile-posts"

[[d1_databases]]
binding = "DB"
database_name = "lownoise"
database_id = "777782fe-6c8f-45c1-826d-365c40bc1210"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "RAW_ARCHIVE"
bucket_name = "lownoise-raw"

[[send_email]]
name = "EMAIL"

[[queues.producers]]
binding = "PROCESSING_QUEUE"
queue = "lownoise-processing"

[[queues.consumers]]
queue = "lownoise-processing"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 4
retry_delay = 60
dead_letter_queue = "lownoise-processing-dlq"

[observability]
enabled = true
head_sampling_rate = 1

[triggers]
crons = ["* * * * *"]

[[routes]]
pattern = "distilled.news"
custom_domain = true

[[routes]]
pattern = "www.distilled.news"
custom_domain = true

[[routes]]
pattern = "lownoise.news"
custom_domain = true

[[routes]]
pattern = "www.lownoise.news"
custom_domain = true
